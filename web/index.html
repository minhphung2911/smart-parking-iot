<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Parking IoT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Smart Parking System</h1>
        <div class="parking-lot">
            <div class="slot" id="slot1">Slot 1</div>
            <div class="slot" id="slot2">Slot 2</div>
            <div class="slot" id="slot3">Slot 3</div>
        </div>
        <div class="status">
            <p>Available: <span id="available">0</span></p>
            <p>Occupied: <span id="occupied">0</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
